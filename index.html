<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>LINSY - Product Details (H5 Demo)</title>
  <style>
    :root {
      --primary: #2cd9c6;
      --primary-dark: #1fb8a8;
      --primary-soft: rgba(44, 217, 198, 0.12);
      --text: #2b3136;
      --muted: #8a959c;
      --line: #e8edef;
      --bg: #f5f7f8;
      --card: #fff;
      --tag-bg: #fff0de;
      --tag-text: #d7892c;
      --danger: #e05c6a;
      --disco: #e05c6a;
      --total-red: #d64545;
      --shadow: 0 8px 24px rgba(20, 45, 58, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }

    .phone {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--card);
      position: relative;
      padding-bottom: calc(68px + env(safe-area-inset-bottom));
    }

    /* Status bar */
    .status-bar {
      height: 44px;
      padding: 10px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 600;
      background: #fff;
    }
    .status-icons { display: flex; gap: 5px; font-size: 12px; color: var(--text); }

    /* Nav */
    .nav-bar {
      height: 48px;
      display: grid;
      grid-template-columns: 40px 1fr 72px;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .nav-btn {
      width: 36px; height: 36px;
      border: none; background: transparent;
      font-size: 20px; color: #4a5560;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .nav-title { text-align: center; font-size: 16px; font-weight: 600; }
    .nav-right { display: flex; justify-content: flex-end; gap: 2px; }
    .nav-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.06); border-radius: 20px;
      padding: 4px 10px; font-size: 14px;
    }

    /* Gallery */
    .gallery-wrap { background: #fff; }
    .gallery-main {
      position: relative;
      width: 100%; aspect-ratio: 1 / 0.82;
      background: #eef1f3; overflow: hidden;
    }
    .gallery-main > img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-strip {
      position: absolute; left: 0; right: 0; bottom: 0;
      display: flex; gap: 8px; padding: 12px 14px;
      overflow-x: auto; scrollbar-width: none;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.32) 0%, rgba(0, 0, 0, 0.08) 55%, transparent 100%);
    }
    .thumb-strip::-webkit-scrollbar { display: none; }
    .thumb {
      flex: 0 0 auto; width: 52px; height: 52px;
      border-radius: 8px; overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.75); padding: 0;
      background: #eef1f3; cursor: pointer;
    }
    .thumb.active {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Product info */
    .info-block { padding: 0 16px 16px; background: #fff; }
    .product-title {
      font-size: 22px; font-weight: 700; line-height: 1.25;
      margin-bottom: 8px; letter-spacing: -0.01em;
    }
    .meta-row {
      font-size: 12px; color: var(--muted);
      margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .badge {
      display: inline-flex; align-items: center;
      height: 22px; padding: 0 8px; border-radius: 4px;
      background: var(--tag-bg); color: var(--tag-text);
      font-size: 11px; font-weight: 600; margin-bottom: 10px;
    }
    .price-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 14px;
    }
    .price-main { font-size: 28px; font-weight: 700; flex-shrink: 0; color: var(--text); }
    .price-main .currency,
    .price-main .unit { color: #b8c0c5; font-weight: 400; }
    .price-main .currency { font-size: 16px; }
    .price-main .unit { font-size: 14px; }
    .price-main .amount { font-weight: 700; color: var(--text); }
    .price-meta {
      font-size: 12px; color: var(--muted);
      text-align: right; flex: 1; line-height: 1.4;
    }

    /* Spec rows */
    .spec-list { border-top: 1px solid var(--line); padding-top: 4px; }
    .spec-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 0; border-bottom: 1px solid var(--line);
      font-size: 13px; color: #4a5560;
    }
    .spec-item:last-child { border-bottom: none; }
    .spec-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      color: var(--muted); margin-top: 1px;
    }
    .spec-item strong { color: var(--text); font-weight: 500; }
    .attr-grid-row {
      display: flex; align-items: center; gap: 8px;
      padding: 14px 0; cursor: pointer;
      border-top: 1px solid var(--line); margin-top: 4px;
    }
    .attr-col { flex: 1; min-width: 0; text-align: center; }
    .attr-val {
      font-size: 13px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 4px;
      margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .attr-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: #eef1f3; border: 1px solid #dfe6ea; flex-shrink: 0;
    }
    .attr-lbl { font-size: 11px; color: var(--muted); }
    .attr-grid-row .chev { color: var(--muted); font-size: 18px; flex-shrink: 0; padding-left: 4px; }

    /* Tabs */
    .tabs-wrap {
      background: #fff; margin-top: 8px;
      border-top: 8px solid var(--bg);
    }
    .tabs {
      display: flex; gap: 0; overflow-x: auto;
      padding: 0 16px; border-bottom: 1px solid var(--line);
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 0 0 auto; border: none; background: transparent;
      padding: 14px 12px 12px; font-size: 14px; color: var(--muted);
      border-bottom: 2px solid transparent; cursor: pointer;
      white-space: nowrap;
    }
    .tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--primary); }

    .tab-panel { padding: 16px; background: #fff; font-size: 13px; line-height: 1.7; color: #56646d; }
    .tab-panel h4 { font-size: 14px; color: var(--text); margin: 16px 0 8px; }
    .tab-panel h4:first-child { margin-top: 0; }
    .tab-panel ul { padding-left: 18px; }
    .tab-panel li { margin-bottom: 6px; }
    .story-img { width: 100%; border-radius: 12px; margin-top: 14px; display: block; }

    .story-carousel {
      position: relative; margin-top: 14px; border-radius: 12px; overflow: hidden;
      background: #eef1f3; aspect-ratio: 16 / 10;
    }
    .story-carousel img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .carousel-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.88); color: #4a5560;
      font-size: 20px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .carousel-nav.prev { left: 10px; }
    .carousel-nav.next { right: 10px; }
    .carousel-dots {
      position: absolute; bottom: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 6px;
    }
    .carousel-dot {
      width: 6px; height: 6px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.55); padding: 0; cursor: pointer;
    }
    .carousel-dot.on { background: #fff; width: 8px; height: 8px; }

    /* Recommend product cards */
    .rec-section { margin-top: 20px; }
    .rec-tabs {
      display: flex; gap: 0; margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .rec-tab {
      flex: 1; border: none; background: transparent;
      padding: 10px 0; font-size: 14px; color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .rec-tab.active { color: var(--text); font-weight: 600; border-bottom-color: var(--primary); }
    .rec-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px 12px;
    }
    .rec-card { cursor: pointer; }
    .rec-img-wrap {
      position: relative; border-radius: 10px; overflow: hidden;
      background: #eef1f3; aspect-ratio: 1/1; margin-bottom: 8px;
    }
    .rec-img-wrap > img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rec-thumbs-overlay {
      position: absolute; left: 0; right: 0; bottom: 0;
      display: flex; gap: 4px; padding: 8px;
      background: linear-gradient(to top, rgba(0,0,0,0.28), transparent);
    }
    .rec-thumbs-overlay span {
      width: 30px; height: 30px; border-radius: 4px;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.75);
      background: #eef1f3;
    }
    .rec-thumbs-overlay img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rec-more {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.9); font-size: 10px;
      font-weight: 600; color: var(--text);
    }
    .rec-title-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 6px; margin-bottom: 6px;
    }
    .rec-name {
      flex: 1; font-size: 12px; line-height: 1.35;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      color: var(--text); min-width: 0;
    }
    .rec-fav {
      border: none; background: transparent; padding: 0;
      font-size: 18px; line-height: 1; color: #56646d;
      cursor: pointer; flex-shrink: 0;
    }
    .rec-fav.on { color: var(--danger); }
    .rec-price { font-size: 16px; font-weight: 700; line-height: 1.2; margin-bottom: 2px; color: var(--text); }
    .rec-price .currency,
    .rec-price .unit { color: #b8c0c5; font-weight: 400; }
    .rec-price .currency { font-size: 12px; }
    .rec-price .unit { font-size: 11px; }
    .rec-price .amount { font-weight: 700; color: var(--text); }
    .rec-item {
      font-size: 11px; color: var(--muted); margin-bottom: 4px;
    }
    .rec-shipping {
      font-size: 11px; color: var(--muted); line-height: 1.5;
      display: flex; flex-wrap: wrap; gap: 2px 10px;
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #fff;
      border-top: 1px solid var(--line);
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      display: grid; grid-template-columns: 48px 1fr; gap: 12px;
      align-items: center; z-index: 30;
    }
    .bar-icon {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      border: none; background: transparent; cursor: pointer; color: #78848d;
      font-size: 10px;
    }
    .bar-icon .ico { font-size: 22px; color: #56646d; font-weight: 400; }
    .bar-icon.active .ico { color: var(--danger); font-weight: 700; }
    .btn-wishlist {
      height: 44px; border: none; border-radius: 8px;
      background: var(--primary); color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
    }
    .btn-wishlist:active { background: var(--primary-dark); }

    /* Overlay & Sheet */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(14, 23, 28, 0.45);
      display: none; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }

    .sheet {
      width: 100%; max-width: 430px;
      background: #fff; border-radius: 16px 16px 0 0;
      display: flex; flex-direction: column;
      animation: slideUp 0.28s ease;
    }
    .sheet-param { max-height: 75vh; height: 75vh; }
    .sheet-picker { max-height: 88vh; height: 88vh; }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .sheet-header {
      display: flex; align-items: center; justify-content: center;
      padding: 16px 48px 12px; position: relative;
      border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .sheet-header h3 { font-size: 16px; font-weight: 600; }
    .sheet-close {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border: none; background: transparent;
      font-size: 22px; color: #78848d; cursor: pointer;
    }

    .sheet-body { overflow-y: auto; flex: 1; padding: 0 16px 16px; }

    /* Parameter list sheet */
    .param-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0; border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .param-row .label { color: var(--muted); }
    .param-row .value { color: var(--text); text-align: right; max-width: 60%; }

    .sheet-footer {
      flex-shrink: 0; border-top: 1px solid var(--line);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: #fff;
    }
    .footer-summary {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 8px 10px; margin-bottom: 10px;
    }
    .footer-check {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; cursor: pointer; flex-shrink: 0;
    }
    .footer-check input { width: 16px; height: 16px; accent-color: var(--primary); }
    .footer-total { font-size: 13px; white-space: nowrap; }
    .footer-total strong { color: var(--total-red); font-size: 16px; font-weight: 700; }
    .footer-selected {
      font-size: 12px; color: var(--muted); cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .footer-selected strong { color: var(--text); }
    .footer-actions { display: flex; gap: 10px; width: 100%; }
    .footer-actions .btn-wishlist { flex: 1; }

    .picker-preview {
      display: flex; gap: 12px; padding: 14px 16px;
      border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .picker-preview img {
      width: 72px; height: 72px; border-radius: 8px;
      object-fit: cover; background: #eef1f3; flex-shrink: 0;
    }
    .picker-preview-info { flex: 1; min-width: 0; }
    .picker-preview-info h4 {
      font-size: 13px; line-height: 1.35; margin-bottom: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .picker-price { font-size: 22px; font-weight: 700; }
    .picker-price .currency, .picker-price .unit { color: #b8c0c5; font-weight: 400; font-size: 14px; }
    .picker-price .amount { font-weight: 700; color: var(--text); }
    .picker-moq { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .sale-tabs {
      display: flex; margin: 0 16px 14px; position: relative;
      height: 40px; border-radius: 8px; overflow: hidden;
      background: #f0f2f4; flex-shrink: 0;
    }
    .sale-tab {
      flex: 1; border: none; background: transparent;
      font-size: 14px; color: #56646d; cursor: pointer;
      position: relative; z-index: 1; height: 100%;
    }
    .sale-tab.active {
      background: rgba(44, 217, 198, 0.18); color: #149c88;
      font-weight: 600; z-index: 2;
    }
    .sale-tab.active:first-child::after {
      content: ''; position: absolute; right: -10px; top: 0;
      width: 20px; height: 100%;
      background: rgba(44, 217, 198, 0.18);
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      z-index: 3;
    }

    .picker-section { margin-bottom: 16px; }
    .picker-section > label {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 10px;
    }

    .color-options {
      display: flex; gap: 10px; overflow-x: auto;
      flex-wrap: nowrap; padding-bottom: 4px; scrollbar-width: none;
    }
    .color-options::-webkit-scrollbar { display: none; }
    .color-opt {
      position: relative; display: flex; flex-direction: column;
      align-items: center; gap: 6px; cursor: pointer;
      border: 2px solid transparent; border-radius: 10px;
      padding: 8px 6px; flex: 0 0 auto; width: 86px;
    }
    .color-opt.active { border-color: #2b3136; }
    .color-opt.disabled { opacity: 0.38; cursor: not-allowed; pointer-events: none; filter: grayscale(0.25); }
    .color-opt img {
      width: 56px; height: 56px; border-radius: 8px;
      object-fit: cover; background: #eef1f3;
    }
    .color-opt span { font-size: 10px; text-align: center; line-height: 1.3; width: 100%; }
    .color-badge {
      position: absolute; top: 2px; right: 2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--primary); color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    .size-options { display: flex; flex-wrap: wrap; gap: 10px; }
    .size-opt {
      min-width: 72px; height: 38px; padding: 0 14px;
      border: 1px solid #dfe6ea; border-radius: 8px;
      background: #fff; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .size-opt.active { border-color: #2b3136; border-width: 2px; font-weight: 600; }
    .style-opt { min-width: auto; max-width: 100%; font-size: 12px; padding: 0 10px; }
    .style-opt.active { border-color: #2b3136; border-width: 2px; font-weight: 600; }
    .size-opt.disabled, .style-opt.disabled {
      opacity: 0.38; cursor: not-allowed; pointer-events: none;
      color: #b0b8bd; background: #f5f7f8;
    }
    .dim-dash {
      min-width: 72px; height: 38px; padding: 0 14px;
      border: 1px dashed #dfe6ea; border-radius: 8px;
      background: #f8f9fa; font-size: 13px; color: #b0b8bd;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .picker-hint {
      font-size: 12px; color: var(--muted);
      padding: 0 4px 10px; line-height: 1.4;
    }

    .sku-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 12px; border-radius: 12px; margin-bottom: 10px;
      border: 1px solid var(--line); background: #fff;
    }
    .sku-row.selected {
      background: rgba(44, 217, 198, 0.14);
      border-color: rgba(44, 217, 198, 0.35);
    }
    .sku-info { flex: 1; min-width: 0; }
    .sku-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .sku-stock { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .tag-disco {
      display: inline-flex; align-items: center;
      height: 18px; padding: 0 6px; border-radius: 4px;
      background: #fde8ea; color: var(--disco);
      font-size: 10px; font-weight: 600;
    }
    .sold-out { font-size: 13px; color: var(--muted); padding: 0 8px; }

    .stepper {
      display: grid; grid-template-columns: 32px 36px 32px;
      border: 1px solid #dfe6ea; border-radius: 8px; overflow: hidden;
      background: #fff;
    }
    .stepper button {
      border: none; background: #fff; font-size: 16px;
      cursor: pointer; color: #56646d; height: 32px;
    }
    .stepper button:disabled { color: #ccc; cursor: not-allowed; }
    .stepper input {
      border: none; border-left: 1px solid #edf1f4;
      border-right: 1px solid #edf1f4;
      text-align: center; font-size: 14px; width: 100%;
      outline: none; height: 32px;
    }

    .sheet-clear {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      border: none; background: transparent; color: var(--primary);
      font-size: 14px; cursor: pointer;
    }

    .selected-item {
      display: flex; gap: 10px; padding: 12px 0;
      border-bottom: 1px solid var(--line); align-items: center;
    }
    .selected-item img {
      width: 56px; height: 56px; border-radius: 8px;
      object-fit: cover; background: #eef1f3; flex-shrink: 0;
    }
    .selected-info { flex: 1; min-width: 0; }
    .selected-desc { font-size: 12px; line-height: 1.4; margin-bottom: 4px; }
    .selected-price { font-size: 13px; font-weight: 600; }
    .selected-stock { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 30, 36, 0.82); color: #fff;
      padding: 12px 24px; border-radius: 10px; font-size: 14px;
      z-index: 200; pointer-events: none; opacity: 0;
      transition: opacity 0.25s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <noscript><p style="padding:20px;text-align:center">Please enable JavaScript to view this demo.</p></noscript>
  <div class="phone" id="app"><p style="padding:24px;text-align:center;color:#78848d">Loading...</p></div>

  <div class="overlay" id="overlayParam">
    <div class="sheet sheet-param" onclick="event.stopPropagation()">
      <div class="sheet-header">
        <h3>Parameter</h3>
        <button class="sheet-close" data-close="param">×</button>
      </div>
      <div class="sheet-body" id="paramBody"></div>
      <div class="sheet-footer">
        <div class="footer-actions">
          <button class="btn-wishlist" data-open-picker>+ add to wishlist</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlayPicker">
    <div class="sheet sheet-picker" onclick="event.stopPropagation()">
      <div class="sheet-header">

    };

    const RECOMMEND = Array.from({ length: 4 }, (_, i) => ({
      id: `rec${i}`,
      title: 'Oxygen Wood Grain Sintered s...',
      item: `LSC25ZH07589${i + 2}`,
      price: 78.56 + i * 12,
      estDel: '7d',
      moq: 5,
      img: IMAGES[i % IMAGES.length],

      moreCount: 12,
    }));

    const state = {
      imageIndex: 0,
      storySlide: 0,
      tab: 'description',
      recTab: 'series',
      recFavs: {},
      favorited: false,
      saleType: 'stock',
      pickerSel: { color: null, size: null, material: null, skuId: null },
      resolvedSku: null,
      qtyMap: { s1: 5, s2: 0, s3: 0, s4: 7, s5: 0, s6: 0, s7: 0, o1: 5, o2: 0, o3: 0, o4: 7 },
      overlay: null,
    };

    const DIM_KEYS = ['color', 'size', 'material'];
    const DIM_LABELS = { color: 'Color', size: 'Size', material: 'Material' };

    function isDimValue(v) {
      return v != null && String(v).trim() !== '' && v !== '-';
    }

    function getPickerSkus() {
      return state.saleType === 'stock' ? PRODUCT.skus : PRODUCT.otherSkus;
    }

    function analyzeDimConfig(skus) {
      const cfg = {};
      DIM_KEYS.forEach((d) => { cfg[d] = skus.some((s) => isDimValue(s[d])); });
      cfg.allEmpty = !cfg.color && !cfg.size && !cfg.material;
      return cfg;
    }

    function filterBySel(skus, sel, skipDim) {
      return skus.filter((s) => {
        for (const d of DIM_KEYS) {
          if (d === skipDim) continue;
          if (sel[d] && isDimValue(s[d]) && s[d] !== sel[d]) return false;
        }
        if (sel.skuId) return s.id === sel.skuId;
        return true;
      });
    }

    function getCandidates(sel) {
      return filterBySel(getPickerSkus(), sel || state.pickerSel);
    }

    function allConfiguredDimsSelected(sel, cfg) {
      return DIM_KEYS.every((d) => !cfg[d] || sel[d]);
    }

    function needsStyleSection(candidates, cfg, sel) {
      if (cfg.allEmpty) return true;
      if (!allConfiguredDimsSelected(sel, cfg)) return false;
      return candidates.length > 1;
    }

    function isDimOptionAvailable(dim, value, sel) {
      const test = { ...sel, [dim]: value, skuId: null };
      return filterBySel(getPickerSkus(), test).length > 0;
    }

    function getUniqueDimValues(skus, dim) {
      return [...new Set(skus.filter((s) => isDimValue(s[dim])).map((s) => s[dim]))];
    }

    function getColorMeta(skus) {
      const map = new Map();
      skus.forEach((s) => {
        if (!isDimValue(s.color) || map.has(s.color)) return;
        map.set(s.color, { value: s.color, img: s.colorImg || PRODUCT.gallery[0] });
      });
      return [...map.values()];
    }

    function buildSkuDesc(s, cfg) {
      const parts = [];
      if (cfg.color) parts.push(isDimValue(s.color) ? s.color : '-');
      if (cfg.size) parts.push(isDimValue(s.size) ? s.size : '-');
      if (cfg.material) parts.push(isDimValue(s.material) ? s.material : '-');
      if (cfg.allEmpty) return s.code;
      if (parts.length && !parts.every((p) => p === '-')) return `${parts.join('; ')}; ${s.code}`;
      return s.code;
    }

    function resetPickerSel() {
      state.pickerSel = { color: null, size: null, material: null, skuId: null };
      state.resolvedSku = null;
    }

    function autoResolvePicker() {
      const skus = getPickerSkus();
      const cfg = analyzeDimConfig(skus);
      let sel = { ...state.pickerSel };

      if (cfg.allEmpty) {
        if (sel.skuId && skus.some((s) => s.id === sel.skuId)) {
          state.resolvedSku = skus.find((s) => s.id === sel.skuId);
        } else if (skus.length === 1) {
          sel.skuId = skus[0].id;
          state.pickerSel = sel;
          state.resolvedSku = skus[0];
        } else {
          state.pickerSel = sel;
          state.resolvedSku = null;
        }
        return;
      }

      let changed = true;
      while (changed) {
        changed = false;
        const candidates = filterBySel(skus, sel);
        for (const d of DIM_KEYS) {
          if (!cfg[d] || sel[d]) continue;
          const vals = getUniqueDimValues(candidates, d);
          if (vals.length === 1) {
            sel[d] = vals[0];
            changed = true;
          }
        }
      }

      state.pickerSel = { ...sel, skuId: sel.skuId };
      let candidates = filterBySel(skus, state.pickerSel);

      if (!allConfiguredDimsSelected(state.pickerSel, cfg)) {
        state.pickerSel.skuId = null;
        state.resolvedSku = null;
        return;
      }

      if (candidates.length === 1) {
        state.pickerSel.skuId = candidates[0].id;
        state.resolvedSku = candidates[0];
        return;
      }

      if (needsStyleSection(candidates, cfg, state.pickerSel)) {
        if (state.pickerSel.skuId && candidates.some((s) => s.id === state.pickerSel.skuId)) {
          state.resolvedSku = candidates.find((s) => s.id === state.pickerSel.skuId);
        } else {
          state.pickerSel.skuId = null;
          state.resolvedSku = null;
        }
        return;
      }

      state.pickerSel.skuId = null;
      state.resolvedSku = null;
    }

    function onPickerDimSelect(dim, value) {
      state.pickerSel[dim] = value;
      state.pickerSel.skuId = null;
      autoResolvePicker();
      renderPicker();
    }

    function onPickerStyleSelect(skuId) {
      state.pickerSel.skuId = skuId;
      autoResolvePicker();
      renderPicker();
    }

    function fmtTotal(v) {
      return '$' + v.toFixed(2);
    }

    function getSelectedItems() {
      const skus = [...PRODUCT.skus, ...PRODUCT.otherSkus];
      const stockCfg = analyzeDimConfig(PRODUCT.skus);
      const customCfg = analyzeDimConfig(PRODUCT.otherSkus);
      const customIds = new Set(PRODUCT.otherSkus.map((s) => s.id));
      return skus.filter((s) => (state.qtyMap[s.id] || 0) > 0).map((s) => ({
        ...s,
        qty: state.qtyMap[s.id],
        desc: buildSkuDesc(s, customIds.has(s.id) ? customCfg : stockCfg),
      }));
    }

    function getSummary() {
      const items = getSelectedItems();
      const pcs = items.reduce((sum, i) => sum + i.qty, 0);
      const total = items.reduce((sum, i) => sum + i.qty * i.price, 0);
      return { itemCount: items.length, pcs, total };
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    function fmtPrice(v) {
      const [int, dec] = v.toFixed(2).split('.');
      return `<span class="currency">$ </span><span class="amount">${int}.${dec}</span><span class="unit"> USD</span>`;
    }

    function fmtRecPrice(v) {
      const [int, dec] = v.toFixed(2).split('.');
      return `<span class="currency">$ </span><span class="amount">${int}.${dec}</span><span class="unit"> USD</span>`;
    }

    function openOverlay(name) {
      const prev = state.overlay;
      state.overlay = name;
      document.getElementById('overlayParam').classList.toggle('open', name === 'param');
      document.getElementById('overlayPicker').classList.toggle('open', name === 'picker');
      document.getElementById('overlaySelected').classList.toggle('open', name === 'selected');
      if (name === 'param') renderParam();
      if (name === 'picker') {
        if (!prev) {
          resetPickerSel();
          autoResolvePicker();
        }
        renderPicker();
      }
      if (name === 'selected') renderSelected();
    }

    function closeOverlay() {
      state.overlay = null;
      document.querySelectorAll('.overlay').forEach(el => el.classList.remove('open'));
    }

    function renderMain() {
      document.getElementById('app').innerHTML = `
        <div class="status-bar">

          <div class="spec-list">

            </div>

              <svg class="spec-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>

            ${['description', 'sizeChart', 'material', 'installation', 'recommend'].map(t => `

          <div class="tab-panel">${renderTabPanel()}</div>

        <footer class="bottom-bar">

            <span>Fav</span>

          <button class="btn-wishlist" id="btnOpenPicker">+ add to wishlist</button>

      bindMain();

    function renderStoryCarousel() {
      const imgs = PRODUCT.lifestyleGallery || PRODUCT.gallery.slice(2, 6);

    function renderRecCard(r) {
      const favOn = !!state.recFavs[r.id];

          </div>
          <div class="rec-price">${fmtRecPrice(r.price)}</div>
          <div class="rec-item">Item : ${r.item}</div>

            <span>MOQ: ${r.moq} pcs</span>

      `;
    }

    function renderRecommendGrid() {
      return `
        <div class="rec-tabs">
          <button class="rec-tab ${state.recTab === 'series' ? 'active' : ''}" data-rec="series">Same Series</button>
          <button class="rec-tab ${state.recTab === 'category' ? 'active' : ''}" data-rec="category">Same Category</button>
        </div>
        <div class="rec-grid">
          ${RECOMMEND.map(r => renderRecCard(r)).join('')}
        </div>
      `;
    }

    function renderTabPanel() {
      if (state.tab === 'description') {
        return `
          <h4>Overview</h4>
          <p>${PRODUCT.description.overview}</p>
          <h4>Product Selling Points</h4>
          <ul>${PRODUCT.description.points.map(p => `<li>${p}</li>`).join('')}</ul>
          ${renderStoryCarousel()}
          <div class="rec-section">${renderRecommendGrid()}</div>
        `;
      }
      if (state.tab === 'sizeChart') {
        return `<h4>Size Chart</h4><p>DIM: ${PRODUCT.dim} · CBM: ${PRODUCT.cbm} · G.W.: ${PRODUCT.gw}</p><img class="story-img" src="${PRODUCT.gallery[2]}" alt="size" />`;
      }
      if (state.tab === 'material') {
        return `<h4>Material</h4><p>${PRODUCT.description.overview}. Structured material info for export compliance.</p><img class="story-img" src="${PRODUCT.gallery[3]}" alt="material" />`;
      }
      if (state.tab === 'installation') {
        return `<h4>Installation</h4><ul><li>Estimated time: ${PRODUCT.installTime}</li><li>Unpack and verify all parts.</li><li>Follow assembly guide included in package.</li></ul>`;
      }
      if (state.tab === 'recommend') {
        return renderRecommendGrid();
      }
      return '';
    }

    function renderColorSection(skus, cfg, sel) {
      if (!cfg.color) {
        return `<div class="picker-section"><label>Color</label><div class="size-options"><span class="dim-dash">-</span></div></div>`;
      }
      const colors = getColorMeta(skus);
      return `
        <div class="picker-section">
          <label>Color</label>
          <div class="color-options">
            ${colors.map((c) => {
              const available = isDimOptionAvailable('color', c.value, sel);
              const active = sel.color === c.value;
              return `
                <div class="color-opt ${active ? 'active' : ''} ${available ? '' : 'disabled'}"
                  data-pick-dim="color" data-value="${c.value.replace(/"/g, '&quot;')}">
                  <img src="${c.img}" alt="" />
                  <span>${c.value}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderChipDimSection(dim, skus, cfg, sel) {
      const label = DIM_LABELS[dim];
      if (!cfg[dim]) {
        return `<div class="picker-section"><label>${label}</label><div class="size-options"><span class="dim-dash">-</span></div></div>`;
      }
      const values = getUniqueDimValues(skus, dim);
      return `
        <div class="picker-section">
          <label>${label}</label>
          <div class="size-options">
            ${values.map((val) => {
              const available = isDimOptionAvailable(dim, val, sel);
              const active = sel[dim] === val;
              return `
                <button type="button"
                  class="size-opt ${active ? 'active' : ''} ${available ? '' : 'disabled'}"
                  data-pick-dim="${dim}" data-value="${String(val).replace(/"/g, '&quot;')}"
                  ${available ? '' : 'disabled'}>${val}</button>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderStyleSection(skus, cfg, sel, candidates) {
      const list = cfg.allEmpty ? skus : candidates;
      return `
        <div class="picker-section">
          <label>Style</label>
          ${cfg.allEmpty
            ? '<p class="picker-hint">No color / size / material configured. Please select a SKU code.</p>'
            : '<p class="picker-hint">Multiple SKU codes match. Please select a style.</p>'}
          <div class="size-options">
            ${list.map((s) => {
              const active = sel.skuId === s.id;
              return `
                <button type="button"
                  class="style-opt size-opt ${active ? 'active' : ''} ${s.soldOut ? 'disabled' : ''}"
                  data-pick-style="${s.id}" ${s.soldOut ? 'disabled' : ''}>
                  ${s.code}${s.disco ? ' · Disco' : ''}${s.soldOut ? ' · Sold Out' : ''}
                </button>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderPickerHint(cfg, sel, candidates) {
      if (cfg.allEmpty) return '';
      const pending = DIM_KEYS.filter((d) => cfg[d] && !sel[d]).map((d) => DIM_LABELS[d]);
      if (pending.length) {
        return `<p class="picker-hint">Please select: ${pending.join(', ')}</p>`;
      }
      if (candidates.length > 1 && !needsStyleSection(candidates, cfg, sel)) {
        return `<p class="picker-hint">${candidates.length} matching SKUs — keep selecting specs.</p>`;
      }
      return '';
    }

    function renderParam() {
      document.getElementById('paramBody').innerHTML = PRODUCT.attributes.map(([label, value]) => `
        <div class="param-row">
          <span class="label">${label}</span>
          <span class="value">${value}</span>
        </div>
      `).join('');
    }

    function renderPicker() {
      autoResolvePicker();

      const skus = getPickerSkus();
      const cfg = analyzeDimConfig(skus);
      const sel = state.pickerSel;
      const candidates = getCandidates(sel);
      const showStyle = needsStyleSection(candidates, cfg, sel);
      const moq = state.saleType === 'custom' ? PRODUCT.customMoq : PRODUCT.moq;
      const previewSku = state.resolvedSku || candidates[0] || skus[0];

      document.getElementById('pickerThumb').src = previewSku?.colorImg || PRODUCT.gallery[0];
      document.getElementById('pickerTitle').textContent = PRODUCT.title;
      document.getElementById('pickerPrice').innerHTML = fmtPrice(previewSku?.price ?? PRODUCT.price);
      document.getElementById('pickerMoq').textContent = `MOQ: ${moq} pcs`;

      document.querySelectorAll('.sale-tab').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.sale === state.saleType);
      });

      let html = '';
      if (!cfg.allEmpty) {
        html += renderColorSection(skus, cfg, sel);
        html += renderChipDimSection('size', skus, cfg, sel);
        html += renderChipDimSection('material', skus, cfg, sel);
      }
      if (showStyle) {
        html += renderStyleSection(skus, cfg, sel, candidates);
      }
      html += renderPickerHint(cfg, sel, candidates);
      if (state.resolvedSku) {
        html += `
          <div class="picker-section">
            <label>Qty</label>
            ${renderSkuRow(state.resolvedSku)}
          </div>
        `;
      }

      document.getElementById('pickerBody').innerHTML = html;
      updateFooter();
      bindPicker();
    }

    function renderSkuRow(s) {
      const qty = state.qtyMap[s.id] || 0;
      const selected = qty > 0;
      if (s.soldOut) {
        return `
          <div class="sku-row">
            <div class="sku-info">
              <div class="sku-name">${s.code}</div>
              <div class="sku-stock">Stock: 0 pcs</div>
            </div>
            <span class="sold-out">Sold Out</span>
          </div>
        `;
      }
      return `
        <div class="sku-row ${selected ? 'selected' : ''}" data-sku="${s.id}">
          <div class="sku-info">
            <div class="sku-name">
              ${s.code}
              ${s.disco ? '<span class="tag-disco">Disco</span>' : ''}
            </div>
            <div class="sku-stock">Stock: ${s.stock.toLocaleString()} pcs</div>
          </div>
          <div class="stepper">
            <button data-step="${s.id}" data-delta="-1" ${qty <= 0 ? 'disabled' : ''}>−</button>
            <input value="${qty}" data-qty-input="${s.id}" readonly />
            <button data-step="${s.id}" data-delta="1">+</button>
          </div>
        </div>
      `;
    }

    function renderSelected() {
      const items = getSelectedItems();
      const { pcs, total, itemCount } = getSummary();
      document.getElementById('selectedTitle').textContent = `Selected ${pcs} Pcs`;
      document.getElementById('selectedBody').innerHTML = items.length ? items.map(item => `
        <div class="selected-item">
          <img src="${PRODUCT.gallery[0]}" alt="" />
          <div class="selected-info">
            <div class="selected-desc">${item.desc}</div>
            <div class="selected-price">${fmtPrice(item.price)}</div>
            <div class="selected-stock">Stock: ${item.stock.toLocaleString()} pcs</div>
          </div>
          <div class="stepper">
            <button data-step="${item.id}" data-delta="-1" ${item.qty <= 0 ? 'disabled' : ''}>−</button>
            <input value="${item.qty}" readonly />
            <button data-step="${item.id}" data-delta="1">+</button>
          </div>
        </div>
      `).join('') : '<p style="padding:20px;text-align:center;color:#8a959c">No items selected</p>';

      document.getElementById('footerTotal2').textContent = fmtTotal(total);
      document.getElementById('footerSelected2').textContent = `${itemCount} Items, ${pcs} Pcs`;
      document.getElementById('checkAll2').checked = itemCount > 0;

      document.querySelectorAll('#selectedBody [data-step]').forEach(btn => {
        btn.onclick = () => changeQty(btn.dataset.step, Number(btn.dataset.delta));
      });
    }

    function updateFooter() {
      const { pcs, total, itemCount } = getSummary();
      document.getElementById('footerTotal').textContent = fmtTotal(total);
      document.getElementById('footerSelected').innerHTML = `${itemCount} Items, ${pcs} Pcs`;
      document.getElementById('checkAll').checked = itemCount > 0;
      if (document.getElementById('footerTotal2')) {
        document.getElementById('footerTotal2').textContent = fmtTotal(total);
        document.getElementById('footerSelected2').textContent = `${itemCount} Items, ${pcs} Pcs`;
      }
    }

    function changeQty(skuId, delta) {
      const allSkus = [...PRODUCT.skus, ...PRODUCT.otherSkus];
      const sku = allSkus.find(s => s.id === skuId);
      if (!sku || sku.soldOut) return;
      const moq = state.saleType === 'custom' ? PRODUCT.customMoq : (sku.moq || PRODUCT.moq);
      let next = (state.qtyMap[skuId] || 0) + delta;
      if (next < 0) next = 0;
      if (next > 0 && next < moq) next = delta > 0 ? moq : 0;
      if (next > sku.stock) {
        showToast(`Max stock: ${sku.stock} pcs`);
        next = sku.stock;
      }
      state.qtyMap[skuId] = next;
      if (state.overlay === 'picker') renderPicker();
      else if (state.overlay === 'selected') { renderSelected(); updateFooter(); }
      else updateFooter();
    }

    function submitWishlist() {
      const { pcs } = getSummary();
      if (pcs <= 0) {
        showToast('Please select quantity');
        return;
      }
      showToast(`Added ${pcs} pcs to wishlist`);
      closeOverlay();
    }

    function bindPicker() {
      document.querySelectorAll('#pickerBody [data-pick-dim]').forEach((el) => {
        el.onclick = () => onPickerDimSelect(el.dataset.pickDim, el.dataset.value);
      });
      document.querySelectorAll('#pickerBody [data-pick-style]').forEach((btn) => {
        btn.onclick = () => onPickerStyleSelect(btn.dataset.pickStyle);
      });
      document.querySelectorAll('#pickerBody [data-step]').forEach((btn) => {
        btn.onclick = () => changeQty(btn.dataset.step, Number(btn.dataset.delta));
      });
      document.querySelectorAll('#saleTabs .sale-tab').forEach((btn) => {
        btn.onclick = () => {
          state.saleType = btn.dataset.sale;
          resetPickerSel();
          autoResolvePicker();
          renderPicker();
        };
      });
    }

    function bindMain() {
      document.querySelectorAll('[data-thumb]').forEach(btn => {
        btn.onclick = () => { state.imageIndex = Number(btn.dataset.thumb); renderMain(); };
      });
      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.onclick = () => { state.tab = btn.dataset.tab; renderMain(); };
      });
      document.querySelectorAll('[data-rec]').forEach(btn => {
        btn.onclick = () => { state.recTab = btn.dataset.rec; renderMain(); };
      });
      document.querySelectorAll('[data-rec-fav]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const id = btn.dataset.recFav;
          state.recFavs[id] = !state.recFavs[id];
          renderMain();
        };
      });
      document.querySelectorAll('[data-story]').forEach(btn => {
        btn.onclick = () => {
          const imgs = PRODUCT.lifestyleGallery || PRODUCT.gallery.slice(2, 6);
          if (btn.dataset.story === 'prev') {
            state.storySlide = (state.storySlide - 1 + imgs.length) % imgs.length;
          } else {
            state.storySlide = (state.storySlide + 1) % imgs.length;
          }
          renderMain();
        };
      });
      document.querySelectorAll('[data-story-dot]').forEach(btn => {
        btn.onclick = () => {
          state.storySlide = Number(btn.dataset.storyDot);
          renderMain();
        };
      });
      document.getElementById('btnFav').onclick = () => {
        state.favorited = !state.favorited;
        renderMain();
      };
      document.getElementById('btnOpenPicker').onclick = () => openOverlay('picker');
      const paramBtn = document.querySelector('[data-open-param]');
      if (paramBtn) paramBtn.onclick = () => openOverlay('param');
    }

    function bindOverlays() {
      document.querySelectorAll('[data-close]').forEach(btn => {
        btn.onclick = () => closeOverlay();
      });
      document.querySelectorAll('.overlay').forEach(overlay => {
        overlay.onclick = (e) => { if (e.target === overlay) closeOverlay(); };
      });
      document.querySelectorAll('[data-open-picker]').forEach(btn => {
        btn.onclick = () => {
          closeOverlay();
          setTimeout(() => openOverlay('picker'), 200);
        };
      });
      document.getElementById('openSelected').onclick = () => openOverlay('selected');
      document.getElementById('closeSelected').onclick = () => openOverlay('picker');
      document.getElementById('btnAddWishlist').onclick = submitWishlist;
      document.getElementById('btnAddWishlist2').onclick = submitWishlist;
      document.getElementById('btnClear').onclick = () => {
        Object.keys(state.qtyMap).forEach(k => { state.qtyMap[k] = 0; });
        renderSelected();
        updateFooter();
      };
    }

    function init() {
      try {
        bindOverlays();
        renderMain();
      } catch (err) {
        console.error(err);
        const app = document.getElementById('app');
        if (app) {
          app.innerHTML = '<p style="padding:24px;color:#d64545;text-align:center">Demo failed to load. Please check index.html is uploaded completely.</p>';
        }
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
